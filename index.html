<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FitPlan</title>
    <link rel="stylesheet" href="Components/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="components/header.js" defer></script>
</head>
<body>
    <my-header></my-header>
    
    <main class="container">
        <aside class="sidebar">
            <nav class="sidebar-nav">
                <div class="sidebar-item active">
                    <span>Мой план</span>
                </div>
                <div class="sidebar-item">
                    <span>Тренировки</span>
                </div>
                <div class="sidebar-item">
                    <span>Упражнения</span>
                </div>
                <div class="sidebar-item">
                    <span>Профиль</span>
                </div>
            </nav>
        </aside>

        <section class="content">
            <h2 class="content-title">Мой план</h2>
            <div class="days-grid">
                <div class="day-card">
                    <div class="day-name">ПОНЕДЕЛЬНИК</div>
                </div>
                <div class="day-card">
                    <div class="day-name">ВТОРНИК</div>
                </div>
                <div class="day-card">
                    <div class="day-name">СРЕДА</div>
                </div>
                <div class="day-card">
                    <div class="day-name">ЧЕТВЕРГ</div>
                </div>
                <div class="day-card">
                    <div class="day-name">ПЯТНИЦА</div>
                </div>
                <div class="day-card">
                    <div class="day-name">СУББОТА</div>
                </div>
            </div>
        </section>
    </main>
</body>
</html>
